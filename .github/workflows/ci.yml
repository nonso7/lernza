name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ── Auto-label ───────────────────────────────────────────────────
  # Single job that handles all labeling:
  #   1. File paths → area labels (contracts, frontend, infrastructure, etc.)
  #   2. PR title prefix → type labels (enhancement, bug, docs, etc.)
  # Runs on open and sync (new commits may change files).
  # Runs on edit (title change may change type label).
  auto-label:
    if: >-
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'release-please[bot]' &&
      github.event.action != 'labeled' &&
      github.event.action != 'unlabeled'
    runs-on: ubuntu-latest
    steps:
      - name: Label by file paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

      - name: Label by PR title prefix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          PREFIX=$(echo "$TITLE" | grep -oP '^\w+' || echo "")

          case "$PREFIX" in
            feat)     LABEL="enhancement" ;;
            fix)      LABEL="bug" ;;
            docs)     LABEL="documentation" ;;
            refactor) LABEL="refactor" ;;
            test)     LABEL="tests" ;;
            ci|build) LABEL="infrastructure" ;;
            security) LABEL="security" ;;
            perf)     LABEL="enhancement" ;;
            *)        LABEL="" ;;
          esac

          if [ -n "$LABEL" ]; then
            HAS=$(gh pr view "$PR_NUM" --repo "$REPO" --json labels \
              -q "[.labels[].name] | any(. == \"$LABEL\")")
            if [ "$HAS" != "true" ]; then
              gh pr edit "$PR_NUM" --repo "$REPO" --add-label "$LABEL"
              echo "Added: $LABEL"
            fi
          fi

  # ── PR quality checks ───────────────────────────────────────────
  # Single job that validates everything about the PR itself:
  #   1. Title follows Conventional Commits
  #   2. Links to an issue (Closes #N or sidebar)
  #   3. Has at least one label (waits for auto-label first)
  pr-checks:
    if: >-
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'release-please[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

      - name: Check linked issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          PR_DATA=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json author,labels,body)

          AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')
          HAS_NO_ISSUE=$(echo "$PR_DATA" | jq -r '.labels | map(.name) | any(. == "no-issue")')

          # Skip for bots and no-issue PRs
          if [ "$AUTHOR" = "dependabot[bot]" ] || [ "$HAS_NO_ISSUE" = "true" ]; then
            echo "Skipped (bot or no-issue label)"
            exit 0
          fi

          # Check GitHub's closing references API (catches sidebar links too)
          OWNER="${{ github.repository_owner }}"
          NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)

          LINKED=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 5) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes | length' 2>/dev/null || echo "0")

          if [ "$LINKED" -gt 0 ]; then
            echo "Linked to $LINKED issue(s)"
            exit 0
          fi

          # Fallback: check body text
          BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          if echo "$BODY" | grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+'; then
            echo "Body contains closing keyword"
            exit 0
          fi

          echo "::error::PR must link to an issue. Use 'Closes #N' in the description, or link via the Development sidebar. Add the 'no-issue' label for trivial changes."
          exit 1

      - name: Check labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Re-fetch labels (auto-label may have just added some)
          LABEL_COUNT=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" --json labels \
            -q '.labels | length')

          if [ "$LABEL_COUNT" -eq 0 ]; then
            echo "::error::PR must have at least one label. Labels are usually added automatically from the PR title and changed files. If auto-labeling didn't trigger, add a label manually."
            exit 1
          fi

          echo "PR has $LABEL_COUNT label(s)"

  # ── Detect what changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            contracts:
              - 'contracts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Frontend: lint + type-check + build ──────────────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check & build
        run: pnpm run build

  # ── Contracts: fmt + clippy + test + build WASM ──────────────────
  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stellar-cli
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,wasm32v1-none
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM contracts
        run: stellar contract build

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: contracts-wasm
          path: target/wasm32v1-none/release/*.wasm
          retention-days: 14
